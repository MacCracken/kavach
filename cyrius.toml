[package]
name = "kavach"
version = "3.0.0"
description = "Sandbox execution framework — 10 backends, strength scoring, 3-scanner gate, HMAC audit chain. Cyrius port of Rust v2.x."
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.4.4"

[build]
entry = "src/main.cyr"
output = "kavach"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "args", "assert", "bigint", "chrono", "hashmap", "freelist", "fnptr", "process", "tagged", "bench"]

[deps.sigil]
path = "/home/macro/Repos/sigil"
modules = ["dist/sigil.cyr"]
